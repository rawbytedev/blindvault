name: Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Run full test suite
      run: go test ./...

    - name: Run integration tests with timeout
      run: |
        go test -v -timeout 15m ./internal/api

    - name: Generate and print crypto vectors
      run: |
        go run scripts/generate_vectors.go --output docs/crypto_vectors.md
        echo "Generated vectors:"
        cat docs/crypto_vectors.md
