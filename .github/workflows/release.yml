name: Manual Release Build

# Manual trigger with inputs
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define the target OS and architecture
        goos: [linux, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' 

      - name: Build client (bv)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o bv-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/bv

      - name: Build server (blindvault)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o blindvault-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/server

      - name: Upload artifacts (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bv-*
            blindvault-*

  release:
    name: Create draft release and attach binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases
    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Draft Release and Upload Assets
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            gh release create ${{ github.event.inputs.version }} \
            --title "Release ${{ github.event.inputs.version }}" \
            --draft=${{ github.event.inputs.draft }} \
            --generate-notes \
            artifacts/**/*