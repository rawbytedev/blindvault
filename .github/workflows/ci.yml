name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  GO_VERSION: '1.25'

jobs:
  # -------- Lint --------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  # -------- Unit Tests (Linux) --------
  test-linux:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests (no Docker)
        run: go test -v -short ./...

      - name: Generate crypto test vectors
        run: |
          go run scripts/generate_vectors.go --output docs/crypto_vectors.md
          echo "Generated vectors:"
          cat docs/crypto_vectors.md

      - name: Upload crypto vectors as artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: crypto-vectors
          path: docs/crypto_vectors.md

  # -------- Unit Tests (Windows) --------
  test-windows:
    name: Unit Tests (Windows)
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # BLST requires gcc; we set up MSYS2 with MinGW
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Run unit tests
        shell: cmd
        run: go test -v -short ./...

      - name: Generate crypto vectors
        shell: cmd
        run: |
          go run scripts/generate_vectors.go --output docs/crypto_vectors.md
          echo "Generated vectors:"
          type docs\crypto_vectors.md

  # -------- Docker Integration (E2E) --------
  docker-test:
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    needs: test-linux   # only run if unit tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache Docker layers to speed up builds
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Run the full CI pipeline: build, start, test, stop
      - name: Run Docker end-to-end tests
        run: |
          make ci
        env:
          # Ensure the test client uses the correct Docker service URL
          BLINDVAULT_URL: http://localhost:8080
          # Use a test‑only JWT secret that matches docker-compose
          AUTH_SECRET: super-secret-token

      # (Optional) Upload test logs if something fails
      - name: Upload Docker logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml logs > docker-logs.txt
        continue-on-error: true

      - name: Upload logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt