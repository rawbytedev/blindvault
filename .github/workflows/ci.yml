name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Run full test suite
      run: go test ./...

    - name: Generate crypto vectors
      run: |
        go run scripts/generate_vectors.go --output docs/crypto_vectors.md
        echo "Generated vectors:" 
        cat docs/crypto_vectors.md

  test-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc

    - name: Run full test suite
      shell: cmd
      run: go test ./...

    - name: Generate crypto vectors
      shell: cmd
      run: |
        go run scripts/generate_vectors.go --output docs/crypto_vectors.md
        echo Generated vectors:
        type docs\crypto_vectors.md